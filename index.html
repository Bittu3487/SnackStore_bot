<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SnackBot Voice + Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<style>
/* ─── RESET & BASE ─────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #080810;
  --surface:  #0f0f1c;
  --card:     #13131f;
  --border:   #1f1f35;
  --accent:   #f4a234;
  --accent2:  #ff6b35;
  --green:    #2ecc71;
  --green2:   #1aab58;
  --text:     #eeeaf4;
  --muted:    #5a5872;
  --user-bg:  #1e1428;
  --user-acc: #f4a234;
  --ai-bg:    #0e1e16;
  --ai-acc:   #2ecc71;
  --mic-off:  #1f1f35;
  --mic-on:   #c0303a;
  --radius:   16px;
}

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}

/* ─── AMBIENT GLOW ──────────────────────────────── */
body::before {
  content: '';
  position: fixed;
  top: -120px; left: 50%;
  transform: translateX(-50%);
  width: 600px; height: 400px;
  background: radial-gradient(ellipse at center,
    rgba(244,162,52,0.06) 0%,
    rgba(255,107,53,0.03) 40%,
    transparent 70%);
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 500px; height: 300px;
  background: radial-gradient(ellipse at center,
    rgba(46,204,113,0.05) 0%,
    transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ─── HEADER ────────────────────────────────────── */
header {
  width: 100%;
  max-width: 520px;
  padding: 20px 20px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
  z-index: 10;
  flex-shrink: 0;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-mark {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  box-shadow: 0 4px 20px rgba(244,162,52,0.3);
  flex-shrink: 0;
}

.logo-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.55rem;
  letter-spacing: 0.06em;
  line-height: 1;
}

.logo-text span { color: var(--accent); }

.status-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 11px;
  font-size: 0.68rem;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--muted);
}

.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  animation: blink 2.2s ease-in-out infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.35; }
}

/* ─── CHAT ──────────────────────────────────────── */
#chat {
  flex: 1;
  min-height: 0;
  width: 100%;
  max-width: 520px;
  overflow-y: auto;
  padding: 6px 16px 10px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  position: relative;
  z-index: 10;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

/* ─── MESSAGES ──────────────────────────────────── */
.msg {
  display: flex;
  flex-direction: column;
  animation: msgIn 0.22s cubic-bezier(0.34,1.56,0.64,1) both;
  max-width: 82%;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(12px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.msg.user { align-self: flex-end; align-items: flex-end; }
.msg.ai   { align-self: flex-start; align-items: flex-start; }

.msg-meta {
  font-size: 0.65rem;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin-bottom: 4px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 5px;
}

.msg.user .msg-meta { flex-direction: row-reverse; }

.msg-meta-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
}

.msg.user .msg-meta-dot { background: var(--user-acc); }
.msg.ai   .msg-meta-dot { background: var(--ai-acc); }

.bubble {
  padding: 10px 15px;
  border-radius: 18px;
  font-size: 0.88rem;
  line-height: 1.6;
  word-break: break-word;
  position: relative;
}

/* USER bubble */
.msg.user .bubble {
  background: var(--user-bg);
  border: 1px solid rgba(244,162,52,0.2);
  border-bottom-right-radius: 5px;
  color: var(--text);
}

.msg.user .bubble::after {
  content: '';
  position: absolute;
  bottom: 0; right: -1px;
  width: 12px; height: 12px;
  background: var(--user-bg);
  border-right: 1px solid rgba(244,162,52,0.2);
  border-bottom: 1px solid rgba(244,162,52,0.2);
  clip-path: polygon(0 0, 100% 0, 100% 100%);
}

/* AI bubble */
.msg.ai .bubble {
  background: var(--ai-bg);
  border: 1px solid rgba(46,204,113,0.15);
  border-bottom-left-radius: 5px;
  color: var(--text);
}

.msg.ai .bubble::after {
  content: '';
  position: absolute;
  bottom: 0; left: -1px;
  width: 12px; height: 12px;
  background: var(--ai-bg);
  border-left: 1px solid rgba(46,204,113,0.15);
  border-bottom: 1px solid rgba(46,204,113,0.15);
  clip-path: polygon(0 0, 0 100%, 100% 0);
}

/* ─── TYPING INDICATOR ──────────────────────────── */
.typing-bubble {
  display: flex;
  gap: 5px;
  align-items: center;
  padding: 12px 16px;
  background: var(--ai-bg);
  border: 1px solid rgba(46,204,113,0.15);
  border-radius: 18px;
  border-bottom-left-radius: 5px;
  width: fit-content;
}

.typing-bubble span {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  animation: typingDot 1.3s ease-in-out infinite;
}

.typing-bubble span:nth-child(2) { animation-delay: 0.18s; }
.typing-bubble span:nth-child(3) { animation-delay: 0.36s; }

@keyframes typingDot {
  0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
  40% { transform: translateY(-5px); opacity: 1; }
}

/* ─── BOTTOM PANEL ──────────────────────────────── */
.bottom-panel {
  width: 100%;
  max-width: 520px;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
  padding: 10px 16px 18px;
  border-top: 1px solid var(--border);
  background: linear-gradient(to top, rgba(8,8,16,0.98) 70%, transparent);
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ─── SEND BOX ──────────────────────────────────── */
#sendBox {
  display: flex;
  gap: 8px;
  align-items: center;
}

#text {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 14px;
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  font-size: 0.88rem;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

#text::placeholder { color: var(--muted); }

#text:focus {
  border-color: rgba(244,162,52,0.4);
  box-shadow: 0 0 0 3px rgba(244,162,52,0.07);
}

/* ─── BUTTONS ───────────────────────────────────── */
button {
  border: none;
  cursor: pointer;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  transition: transform 0.12s, box-shadow 0.2s, opacity 0.2s;
}

button:active { transform: scale(0.94); }

/* Send button */
#sendBtn {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #0a0008;
  border-radius: 12px;
  padding: 10px 18px;
  font-size: 0.85rem;
  letter-spacing: 0.03em;
  white-space: nowrap;
  box-shadow: 0 4px 16px rgba(244,162,52,0.25);
}

#sendBtn:hover { box-shadow: 0 4px 24px rgba(244,162,52,0.4); }

/* Mic button */
#mic {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 11px 0;
  border-radius: 14px;
  font-size: 0.85rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--muted);
  position: relative;
  overflow: hidden;
}

#mic::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(192,48,58,0), rgba(192,48,58,0));
  transition: background 0.3s;
}

#mic.on {
  border-color: rgba(192,48,58,0.5);
  color: #ff7a7a;
  animation: micPulse 1.8s ease-in-out infinite;
}

#mic.on::before {
  background: linear-gradient(135deg, rgba(192,48,58,0.12), rgba(224,75,75,0.06));
}

@keyframes micPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(192,48,58,0.3); }
  50% { box-shadow: 0 0 0 8px rgba(192,48,58,0); }
}

.mic-icon {
  font-size: 1.1rem;
  transition: transform 0.2s;
}

#mic.on .mic-icon { animation: micBounce 0.8s ease-in-out infinite alternate; }

@keyframes micBounce {
  from { transform: scale(1); }
  to   { transform: scale(1.2); }
}

/* ripple rings when mic is on */
.mic-rings {
  position: absolute;
  right: 18px; top: 50%;
  transform: translateY(-50%);
  display: flex;
  gap: 3px;
  align-items: center;
  height: 18px;
  opacity: 0;
  transition: opacity 0.3s;
}

#mic.on .mic-rings { opacity: 1; }

.mic-rings span {
  width: 3px;
  background: #ff7a7a;
  border-radius: 2px;
  animation: soundBar 0.7s ease-in-out infinite alternate;
}

.mic-rings span:nth-child(1) { height: 6px; animation-delay: 0s; }
.mic-rings span:nth-child(2) { height: 14px; animation-delay: 0.1s; }
.mic-rings span:nth-child(3) { height: 10px; animation-delay: 0.2s; }
.mic-rings span:nth-child(4) { height: 16px; animation-delay: 0.05s; }
.mic-rings span:nth-child(5) { height: 8px; animation-delay: 0.15s; }

@keyframes soundBar {
  from { transform: scaleY(0.4); }
  to   { transform: scaleY(1); }
}

/* ─── SCROLLBAR ─────────────────────────────────── */
#chat::-webkit-scrollbar { width: 4px; }
#chat::-webkit-scrollbar-track { background: transparent; }
#chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-mark">🍟</div>
    <div class="logo-text">Snack<span>Bot</span></div>
  </div>
  <div class="status-badge">
    <div class="status-dot"></div>
    Online
  </div>
</header>

<!-- CHAT -->
<div id="chat"></div>

<!-- BOTTOM PANEL -->
<div class="bottom-panel">

  <!-- Text input row -->
  <div id="sendBox">
    <input id="text" placeholder="Message likhein..." autocomplete="off"
      onkeydown="if(event.key==='Enter') sendText()" />
    <button id="sendBtn" onclick="sendText()">↑ Send</button>
  </div>

  <!-- Mic button -->
  <button id="mic" onclick="toggleMic()">
    <span class="mic-icon">🎤</span>
    <span id="micLabel">Mic OFF — Click to speak</span>
    <div class="mic-rings">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
  </button>

</div>

<script>

const BACKEND = "http://localhost:3000";

let recognition;
let micOn = false;
let isSpeaking = false;

// ─── CHAT UI ──────────────────────────────────────
function addMsg(text, type) {
  const wrap = document.createElement("div");
  wrap.className = "msg " + type;

  const meta = document.createElement("div");
  meta.className = "msg-meta";

  const dot = document.createElement("div");
  dot.className = "msg-meta-dot";

  const name = document.createElement("span");
  name.textContent = type === "user" ? "Aap" : "SnackBot";

  meta.appendChild(dot);
  meta.appendChild(name);

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerText = text;

  wrap.appendChild(meta);
  wrap.appendChild(bubble);

  const chat = document.getElementById("chat");
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const wrap = document.createElement("div");
  wrap.className = "msg ai";
  wrap.id = "typing";

  const meta = document.createElement("div");
  meta.className = "msg-meta";
  meta.innerHTML = '<div class="msg-meta-dot"></div><span>SnackBot</span>';

  const bubble = document.createElement("div");
  bubble.className = "typing-bubble";
  bubble.innerHTML = "<span></span><span></span><span></span>";

  wrap.appendChild(meta);
  wrap.appendChild(bubble);

  const chat = document.getElementById("chat");
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  document.getElementById("typing")?.remove();
}

// ─── MIC SETUP ───────────────────────────────────
function setupMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();

  recognition.lang = "hi-IN";
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript;
    addMsg(text, "user");
    sendToAI(text);
  };

  recognition.onerror = () => {
    stopMic();
  };

  recognition.onend = () => {
    if (micOn) {
      // only restart if user manually wants (not auto)
    }
  };
}

// ─── MIC TOGGLE ──────────────────────────────────
function toggleMic() {
  if (!recognition) setupMic();

  if (!micOn) {
    micOn = true;
    document.getElementById("mic").classList.add("on");
    document.getElementById("micLabel").textContent = "Mic ON — Sunna shuru...";
    recognition.start();
  } else {
    stopMic();
  }
}

function stopMic() {
  micOn = false;
  document.getElementById("mic").classList.remove("on");
  document.getElementById("micLabel").textContent = "Mic OFF — Click to speak";
  recognition?.stop();
}

// ─── SEND TEXT ────────────────────────────────────
function sendText() {
  const text = document.getElementById("text").value.trim();
  if (!text) return;
  addMsg(text, "user");
  document.getElementById("text").value = "";
  sendToAI(text);
}

// ─── AI CALL ─────────────────────────────────────
async function sendToAI(message) {
  showTyping();
  try {
    const res = await fetch(BACKEND + "/ai", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message, sessionId: "web_user" })
    });

    const data = await res.json();
    removeTyping();
    addMsg(data.reply, "ai");
    speak(data.reply);

  } catch (e) {
    removeTyping();
    addMsg("❌ Server se connect nahi ho paya.", "ai");
  }
}

// ─── SPEAK ───────────────────────────────────────
function speak(text) {
  isSpeaking = true;
  const ut = new SpeechSynthesisUtterance(text);
  ut.lang = "hi-IN";
  ut.onend = () => { isSpeaking = false; };
  speechSynthesis.speak(ut);
}

// ─── INIT ─────────────────────────────────────────
setupMic();

// Welcome message
addMsg("Namaste! 🙏 Main SnackBot hoon. Lays, Bingo, Kurkure ya Doritos — kya chahiye? Please type Welcome", "ai");

</script>
</body>
</html>
